<div class="chat-wrapper">
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-content">
                <div class="header-left">
                    <img src="{favicon}" alt="PlaceMakers" class="logo">
                    <div class="header-text">
                        <h1 class="title">BuildMate</h1>
                        <p class="subtitle">Your 24/7 PlaceMakers Expert for Projects & Products</p>
                    </div>
                </div>
                <div class="header-icons">
                    <button class="icon-btn" title="Cart">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 2L4 6v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6l-5-4H9z"/>
                            <path d="M9 2v4a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V2"/>
                        </svg>
                    </button>
                    <button class="icon-btn" title="Expand">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                        </svg>
                    </button>
                    <button class="icon-btn" title="Close">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            {messages}
        </div>
        <div class="status-message">{status}</div>
    </div>
</div>
